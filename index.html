        poly.setAttribute('stroke-width', '1.0');
        poly.dataset.cellWall = '1'; // tag for inactive/active switching
        poly.classList.add('hex-face');

        // Bevel overlay polygon (same shape, no pointer events)
        const bevPoly = document.createElementNS(svgNS, 'polygon');
        bevPoly.setAttribute('points', pointsAttr(pts, lcx, lcy));
        bevPoly.setAttribute('fill', `url(#${bevId})`);
        bevPoly.setAttribute('pointer-events', 'none');
        bevPoly.setAttribute('stroke', 'none');

        // Top edge highlight — 1px lighter stroke on upper-left edges only
        const edgeId = `e${col}_${row}`;
        const edgeMask = document.createElementNS(svgNS, 'linearGradient');
        edgeMask.id = edgeId;
        edgeMask.setAttribute('x1','0%'); edgeMask.setAttribute('y1','0%');
        edgeMask.setAttribute('x2','0%'); edgeMask.setAttribute('y2','100%');
        const e1 = document.createElementNS(svgNS, 'stop');
        e1.setAttribute('offset','0%'); e1.setAttribute('stop-color','rgba(255,255,255,0.15)');
        const e2 = document.createElementNS(svgNS, 'stop');
        e2.setAttribute('offset','100%'); e2.setAttribute('stop-color','rgba(255,255,255,0.0)');
        edgeMask.appendChild(e1); edgeMask.appendChild(e2);
        defs.appendChild(edgeMask);

        const edgePoly = document.createElementNS(svgNS, 'polygon');
        edgePoly.setAttribute('points', pointsAttr(pts, lcx, lcy));
        edgePoly.setAttribute('fill', 'none');
        edgePoly.setAttribute('stroke', `url(#${edgeId})`);
        edgePoly.setAttribute('stroke-width', '1');
        edgePoly.setAttribute('pointer-events', 'none');

        const ring = document.createElementNS(svgNS, 'polygon');
        ring.setAttribute('points', pointsAttr(ringPts, lcx, lcy));
        ring.classList.add('hex-ring');

        svg.appendChild(poly); svg.appendChild(bevPoly);
        svg.appendChild(edgePoly); svg.appendChild(ring);
        div.appendChild(svg); stage.appendChild(div);

        const btnObj = { el: div, poly, ring, s1, s2, s3, col, row, key, voice: null, active: false, cx, cy };
        setHexColor(btnObj, 0, 0, 0, 0.0); // start as empty cell
        btns.push(btnObj);
        hexMap[key] = btnObj;
        window._btnByKey = hexMap; // alias for master clock
      }
    }
    // Assign per-hex colors now that all btns exist and neighbor lookup works
    assignHexColors(btns);

    // Remove the 7 joystick zone hexes from the DOM and data structures
    // Pick the hex closest to the screen centre with a full ring of 6 neighbors
    const midX = W / 2, midY = H + safeTop;
    const sorted = [...btns].sort((a, b) => {
      const da = (a.cx - midX) ** 2 + (a.cy - midY) ** 2;
      const db = (b.cx - midX) ** 2 + (b.cy - midY) ** 2;
      return da - db;
    });
    let stickPick = null;
    for (const btn of sorted) {
      const nkeys = getNeighborKeys(btn.col, btn.row);
      if (nkeys.every(k => hexMap[k])) { stickPick = btn; break; }
    }
    if (stickPick) {
      stickPickCx = stickPick.cx;  // save before deletion
      stickPickCy = stickPick.cy;

      // Draw well BEFORE removing hexes so drawStickWell can read their positions
      drawStickWell(stickPick);

      // The well is visually shifted by (-colSpacing, -rowSpacing*0.5) from stickPick.
      // Find the hex closest to that shifted position — that is the true visual centre —
      // and delete THAT hex's zone so the grid matches what the well covers.
      const colSp = hexR * 1.5 + GAP;
      const rowSp = hexR * Math.sqrt(3) + GAP;
      const wellCx = stickPick.cx - colSp;
      const wellCy = stickPick.cy - rowSp * 0.5;
      const visualCentre = btns.reduce((best, b) => {
        const db = (b.cx - wellCx) ** 2 + (b.cy - wellCy) ** 2;
        const dBest = (best.cx - wellCx) ** 2 + (best.cy - wellCy) ** 2;
        return db < dBest ? b : best;
      }, btns[0]);

      const zoneKeys = [visualCentre.key, ...getNeighborKeys(visualCentre.col, visualCentre.row)];
      zoneKeys.forEach(k => {
        const b = hexMap[k];
        if (!b) return;
        b.el.remove();
        delete hexMap[k];
        const idx = btns.indexOf(b);
        if (idx !== -1) btns.splice(idx, 1);
      });
    }

    // Update joystick travel to 1.5 hex radii — reaches edge of adjacent hex
    MAX_TRAVEL = Math.round(hexR * 1.5);

    // Init both crawlers after grid is ready
    setTimeout(() => { initCrawler(); initLeadCrawler(); }, 50);
  }

  const BASE_R = 18, BASE_G = 16, BASE_B = 24;
  function setHexColor(btn, R, G, B, intensity) {
    if (intensity === undefined) intensity = 1.0;
    const lerp = (a, b, t) => Math.round(a + (b - a) * t);

    if (intensity < 0.05) {
      // ── Empty cell: transparent fill, thin wax-wall stroke ──
      btn.el.style.setProperty('--r', BASE_R);
      btn.el.style.setProperty('--g', BASE_G);
      btn.el.style.setProperty('--b', BASE_B);
      btn.s1 && btn.s1.setAttribute('stop-color', 'rgba(0,0,0,0)');
      btn.s2.setAttribute('stop-color', 'rgba(0,0,0,0)');
      btn.s3.setAttribute('stop-color', 'rgba(0,0,0,0)');
      btn.poly.setAttribute('fill', 'rgba(20,14,32,0.22)');
      btn.poly.setAttribute('stroke', 'rgba(90,75,130,0.48)');
      btn.poly.setAttribute('stroke-width', '0.85');
    } else {
      // ── Active / pulsing: full lit surface ──
      const rr = lerp(BASE_R, R, intensity);
      const gg = lerp(BASE_G, G, intensity);
      const bb = lerp(BASE_B, B, intensity);
      btn.el.style.setProperty('--r', rr);
      btn.el.style.setProperty('--g', gg);
      btn.el.style.setProperty('--b', bb);

      const cr = Math.min(255, Math.round(rr * 1.35 + 12 * intensity));
      const cg = Math.min(255, Math.round(gg * 1.35 +  8 * intensity));
      const cb = Math.min(255, Math.round(bb * 1.30 +  5 * intensity));
      btn.s1 && btn.s1.setAttribute('stop-color', `rgba(${cr},${cg},${cb},1)`);
      btn.s2.setAttribute('stop-color', `rgba(${rr},${gg},${bb},1)`);
      const dr = Math.round(rr * 0.38);
      const dg = Math.round(gg * 0.38);
      const db = Math.round(bb * 0.38);
      btn.s3.setAttribute('stop-color', `rgba(${dr},${dg},${db},1)`);
      btn.poly.setAttribute('fill', `url(#g${btn.col}_${btn.row})`);
      btn.poly.setAttribute('stroke', 'rgba(0,0,0,0.75)');
      btn.poly.setAttribute('stroke-width', '1.0');
    }
  }

  function getNeighborKeys(col, row) {
    const isOdd = col % 2 === 1;
    const dirs = isOdd
      ? [[-1,0],[1,0],[0,-1],[0,1],[-1,1],[1,1]]
      : [[-1,0],[1,0],[0,-1],[0,1],[-1,-1],[1,-1]];
    return dirs.map(([dc,dr]) => `${col+dc},${row+dr}`);
  }

  function pulseHex(nb, R, G, B, cls, duration, intensity) {
    if (!nb) return;
    if (!nb.active) setHexColor(nb, R, G, B, intensity);
    nb.el.classList.remove('neighbor-pulse', 'neighbor-pulse-2');
    void nb.el.offsetWidth;
    nb.el.classList.add(cls);
    setTimeout(() => {
      nb.el.classList.remove(cls);
      if (!nb.active) {
        // Don't wipe crawler/pending hexes — they repaint themselves
        const isCrawlerHex =
          (CRAWLER.btn && nb.key === CRAWLER.btn.key) ||
          CRAWLER.trail.some(t => t.btn.key === nb.key) ||
          (PENDING.btn && nb.key === PENDING.btn.key) ||
          (LEAD.btn && nb.key === LEAD.btn.key) ||
          LEAD.trail.some(t => t.btn.key === nb.key) ||
          (LEAD_PENDING.btn && nb.key === LEAD_PENDING.btn.key);
        if (!isCrawlerHex) setHexColor(nb, 0, 0, 0, 0.0);
      }
    }, duration);
  }

  // For spoke-aligned rings: given center btn and a ring-1 neighbor,
  // find the ring-1 neighbor's neighbor that continues outward in the same direction.
  // "Same direction" = the neighbor of nb that is NOT center and NOT another ring-1 hex,
  // AND is closest to the vector from center → nb extended outward.
  function spokeNext(centerBtn, nb, excludeKeys) {
    const dx = nb.cx - centerBtn.cx;
    const dy = nb.cy - centerBtn.cy;
    // Target position: one more step in same direction
    const tx = nb.cx + dx;
    const ty = nb.cy + dy;
    // Find nb's neighbor closest to target, not in excludeKeys
    const candidates = getNeighborKeys(nb.col, nb.row)
      .filter(k => !excludeKeys.has(k) && hexMap[k]);
    if (!candidates.length) return null;
    // Pick closest to (tx, ty)
    let best = null, bestDist = Infinity;
    candidates.forEach(k => {
      const b = hexMap[k];
      const d = Math.hypot(b.cx - tx, b.cy - ty);
      if (d < bestDist) { bestDist = d; best = k; }
    });
    return best;
  }

  function visualFlash(btn) {
    const [R, G, B] = getColor(btn.key);
    btn.el.classList.add('pressed');
    setTimeout(() => btn.el.classList.remove('pressed'), 160);

    const ring1Keys = getNeighborKeys(btn.col, btn.row);
    const ring1Set  = new Set([btn.key, ...ring1Keys]);

    // Ring 1 — 6 direct neighbors
    setTimeout(() => {
      ring1Keys.forEach(nk => pulseHex(hexMap[nk], R, G, B, 'neighbor-pulse', 620, 0.52));
    }, 30);

    // Ring 2 — full second ring
    const ring2Keys = [];
    ring1Keys.forEach(nk => {
      const nb = hexMap[nk];
      if (!nb) return;
      getNeighborKeys(nb.col, nb.row).forEach(k => {
        if (!ring1Set.has(k) && !ring2Keys.includes(k)) ring2Keys.push(k);
      });
    });

    setTimeout(() => {
      ring2Keys.forEach(nk => pulseHex(hexMap[nk], R, G, B, 'neighbor-pulse-2', 750, 0.32));
    }, 90);

  }

  // Ordered queue of active kick hexes — oldest first
  const MAX_ACTIVE = 6;
  const activeQueue = [];

  function evictOldest() {
    const oldest = activeQueue.shift();
    if (!oldest || !oldest.active) return;
    oldest.active = false;
    stopLoop(oldest.key);
    oldest.el.classList.remove('active', 'pressed');
    setHexColor(oldest, 28, 22, 18);
  }

  function registerActive(btn) {
    // Remove if already in queue (re-tap toggles off, so this shouldn't happen,
    // but guard anyway)
    const idx = activeQueue.indexOf(btn);
    if (idx !== -1) activeQueue.splice(idx, 1);
    if (activeQueue.length >= MAX_ACTIVE) evictOldest();
    activeQueue.push(btn);
  }

  function unregisterActive(btn) {
    const idx = activeQueue.indexOf(btn);
    if (idx !== -1) activeQueue.splice(idx, 1);
  }

  function trigger(btn) {
    if (!btn.active) {
      if (!btn.voice) btn.voice = randomVoice();
      btn.active = true;
      registerActive(btn);
      rerollHexColor(btn);                    // new color, maximally distant from neighbors
      const [R, G, B] = getColor(btn.key);
      setHexColor(btn, R, G, B);
      btn.el.classList.add('active');
      play808(btn.voice);
      visualFlash(btn);
      startLoop(btn.key, btn);
    } else {
      btn.active = false;
      unregisterActive(btn);
      stopLoop(btn.key);
      btn.el.classList.remove('active', 'pressed');
      setHexColor(btn, 28, 22, 18);
    }
  }

  function hitTest(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return null;
    const hexDiv = el.closest('.hex');
    if (!hexDiv) return null;
    return btns.find(b => b.el === hexDiv) || null;
  }

  const touched = new Set();

  function attachStageEvents() {
    stage.addEventListener('pointerdown', e => {
      e.preventDefault();
      stage.setPointerCapture(e.pointerId);
      const b = hitTest(e.clientX, e.clientY);
      if (b && !touched.has(b.key)) {
        touched.add(b.key);
        if (!pitchCtrlHitTest(b) && !leadPitchHitTest(b) && !leadCrawlerHitTest(b) && !crawlerHitTest(b)) trigger(b);
      }
    }, { passive: false });

    stage.addEventListener('pointermove', e => {
      e.preventDefault();
      const b = hitTest(e.clientX, e.clientY);
      if (b && !touched.has(b.key)) {
        touched.add(b.key);
        if (!pitchCtrlHitTest(b) && !leadPitchHitTest(b) && !leadCrawlerHitTest(b) && !crawlerHitTest(b)) trigger(b);
      }
    }, { passive: false });

    stage.addEventListener('pointerup',     () => touched.clear());
    stage.addEventListener('pointercancel', () => touched.clear());

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        activeButtons.clear(); stopMasterClock();
        clearPending(); pauseCrawler(); resetCrawler();
        buildGrid();
      }, 120);
    });
  }

  // ══════════════════════════════════════════════════════════════════
  //  CRAWLER — arpeggiated double-saw bass synth that roams the grid
  // ══════════════════════════════════════════════════════════════════

  const CRAWLER = {
    active:   false,   // currently crawling
    btn:      null,    // current hex btn
    trail:    [],      // [{btn, age}] — age 0=just left, 1=older
    timer:    null,    // movement interval
    arpSeq:   [],      // current arp note sequence (Hz)
    arpIdx:   0,       // position in sequence
    arpTimer: null,    // arp note timer
    homeBtn:  null,    // top-left anchor hex
    pulseEl:  null,    // DOM overlay for idle pulse
    nodes:    {},      // live audio nodes for cleanup
    stuttering: false,  // debounce for kick-cross event
    paused:     false,  // paused in place (not stopped/reset)
    fullArpSeq: [],     // original full-length sequence for halving reference
    nextArpSeq: null,   // queued pattern, switches at loop boundary
  };

  // ── Dual-saw oscillator with slight detune ──
  // Fade out the bass arp bus over ~600ms then stop the crawler
  function fadeOutBassArp(cb) {
    if (!arpBus || !audioCtx) { if (cb) cb(); return; }
    const gen = ++PENDING.fadeGen;
    const now = audioCtx.currentTime;
    const fadeDur = 1.4;
    arpBus.gain.cancelScheduledValues(now);
    arpBus.gain.setValueAtTime(Math.max(0.001, arpBus.gain.value), now);
    arpBus.gain.exponentialRampToValueAtTime(0.001, now + fadeDur);
    setTimeout(() => {
      if (gen !== PENDING.fadeGen) return; // cancelled by a newer action
      if (arpBus) { arpBus.gain.cancelScheduledValues(0); arpBus.gain.value = 0.80; }
      if (cb) cb();
    }, (fadeDur + 0.1) * 1000);
  }

  function playSawNote(freq, dur, vol) {
    const c = getCtx(), now = c.currentTime + AUDIO_AHEAD;
    const master = c.createGain();
    master.gain.setValueAtTime(vol * 0.7, now);
    master.gain.setValueAtTime(vol * 0.7, now + dur * 0.7);
    master.gain.linearRampToValueAtTime(0, now + dur);

    [0, 7].forEach(detuneCents => {  // two saws, 7 cents apart
      const osc = c.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq * Math.pow(2, detuneCents / 1200);
      const lpf = c.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.setValueAtTime(800 + freq * 3, now);
      lpf.frequency.linearRampToValueAtTime(300, now + dur * 0.8);
      lpf.Q.value = 2.2;
      osc.connect(lpf); lpf.connect(master);
      osc.start(now); osc.stop(now + dur + 0.01);
    });

    master.connect(getArpDest());
  }

  // Chord splash: root + fifth + octave fired simultaneously (one-shot power chord)
  function playChordSplash(freq) {
    const ratios = [1.0, 1.5, 2.0]; // root, fifth, octave
    ratios.forEach(r => playSawNote(freq * r, (SIXTEENTH_MS * 1.6) / 1000, 0.20));
  }

  // Stutter: repeat current note 3x as rapid 32nd triplets
  function playStutter(freq) {
    const gap = SIXTEENTH_MS / 3; // 32nd-note triplet spacing
    const dur = (gap * 0.85) / 1000;
    [0, 1, 2].forEach(i => {
      setTimeout(() => {
        if (CRAWLER.active) playSawNote(freq, dur, 0.22);
      }, i * gap);
    });
  }

  // Trigger the kick-crossing event: stutter + chord splash + pitch memory
  function crawlerKickCross(kickBtn) {
    if (CRAWLER.stuttering) return; // debounce
    CRAWLER.stuttering = true;

    const seq  = CRAWLER.arpSeq;
    const freq = seq.length ? seq[CRAWLER.arpIdx % seq.length] : (rootPitch || 80);

    // Visual: brief white flash on the kick hex
    kickBtn.el.classList.add('pressed');
    setTimeout(() => kickBtn.el.classList.remove('pressed'), 180);

    // Stutter immediately
    playStutter(freq);

    // Chord splash after stutter
    setTimeout(() => {
      if (CRAWLER.active) playChordSplash(freq);
      CRAWLER.stuttering = false;
    }, SIXTEENTH_MS);

  }

  // Build a melodic arp sequence from rootPitch using harmonic intervals
  function buildArpSeq() {
    const root = rootPitch || 80;
    // Pick 4–6 intervals, bias toward lower ratios for bass character
    const bassIntervals = HARMONIC_INTERVALS.filter(iv => iv.ratio <= 2.0);
    const len = Math.random() < 0.5 ? 8 : 16;
    const seq = [];
    const usedR = [];
    for (let i = 0; i < len; i++) {
      const pool = bassIntervals.filter(iv => !usedR.slice(-2).includes(iv.ratio));
      const iv = pool[Math.floor(Math.random() * pool.length)];
      usedR.push(iv.ratio);
      let hz = root * iv.ratio;
      // Keep in bass range 40–200 Hz
      while (hz < 40)  hz *= 2;
      while (hz > 200) hz *= 0.5;
      seq.push(hz);
    }
    return seq;
  }

  // Visual: paint crawler hex white, trail hexes at fading intensity
  function renderCrawler() {
    // First pass: clear trail hexes (skip pending hex), restore rings
    CRAWLER.trail.forEach(t => {
      if (!t.btn.active && t.btn !== PENDING.btn) {
        t.btn.el.classList.remove('crawler-over');
        t.btn.el.style.filter = '';
        setHexColor(t.btn, 0, 0, 0, 0.0);
      }
    });

    // Second pass: repaint trail (paint over kick hexes too)
    CRAWLER.trail.forEach(t => {
      const intensity = t.age === 0 ? 0.40 : t.age === 1 ? 0.18 : 0.07;
      crawlerPaint(t.btn, 180, 160, 255, intensity);
      t.btn.el.style.filter = '';
    });

    // Paint current hex bright white (even over kick hexes)
    if (CRAWLER.btn) {
      crawlerPaint(CRAWLER.btn, 255, 250, 255, 0.92);
      CRAWLER.btn.el.style.filter =
        'drop-shadow(0 0 14px rgba(200,180,255,0.9)) drop-shadow(0 0 30px rgba(160,120,255,0.5))';
    }
  }

  function clearCrawlerVisual() {
    if (CRAWLER.btn) restoreHexAfterCrawler(CRAWLER.btn);
    CRAWLER.trail.forEach(t => restoreHexAfterCrawler(t.btn));
    CRAWLER.trail = [];
  }

  // Restore a hex to its lit kick colour or blank, after crawler trail expires
  function restoreHexAfterCrawler(btn) {
    if (!btn) return;
    btn.el.classList.remove('crawler-over'); // restore ring
    btn.el.style.filter = '';
    if (btn.active) {
      // Kick hex — restore its drum colour
      const R = btn.el.style.getPropertyValue('--r') || 60;
      const G = btn.el.style.getPropertyValue('--g') || 60;
      const B = btn.el.style.getPropertyValue('--b') || 80;
      setHexColor(btn, parseInt(R), parseInt(G), parseInt(B), 0.85);
    } else {
      setHexColor(btn, 0, 0, 0, 0.0);
    }
  }

  // Move crawler one step to a random neighbor
  function crawlerStep() {
    if (!CRAWLER.active || !CRAWLER.btn) return;

    // Clear aged-out hexes BEFORE trimming the array
    CRAWLER.trail.forEach(t => t.age++);
    const expired = CRAWLER.trail.filter(t => t.age > 1);
    expired.forEach(t => restoreHexAfterCrawler(t.btn));
    CRAWLER.trail = CRAWLER.trail.filter(t => t.age <= 2);
    CRAWLER.trail.push({ btn: CRAWLER.btn, age: 0 });

    const allNeighbors = getNeighborKeys(CRAWLER.btn.col, CRAWLER.btn.row)
      .map(k => hexMap[k]).filter(Boolean);
    const kickNeighbors = allNeighbors.filter(b => b.active);
    // Allow crawling onto kick hexes — exclude only the home hex
    const moveNeighbors = allNeighbors.filter(b => b.key !== CRAWLER.homeBtn?.key);

    // 30% chance to trigger kick-cross event when adjacent
    if (kickNeighbors.length && Math.random() < 0.30) {
      const crossedKick = kickNeighbors[Math.floor(Math.random() * kickNeighbors.length)];
      crawlerKickCross(crossedKick);
    }

    if (moveNeighbors.length) {
      CRAWLER.btn = moveNeighbors[Math.floor(Math.random() * moveNeighbors.length)];
    }

    renderCrawler();
  }

  // Arp tick: play next note, switch to queued pattern at loop start
  function crawlerArpTick() {
    if (!CRAWLER.active) return;
    const seq = CRAWLER.arpSeq;
    if (!seq.length) return;
    // At position 0, swap in queued pattern if one is waiting
    if (CRAWLER.arpIdx === 0 && CRAWLER.nextArpSeq) {
      CRAWLER.arpSeq = CRAWLER.nextArpSeq;
      CRAWLER.fullArpSeq = CRAWLER.nextArpSeq.slice();
      CRAWLER.nextArpSeq = null;
    }
    const freq = CRAWLER.arpSeq[CRAWLER.arpIdx % CRAWLER.arpSeq.length];
    CRAWLER.arpIdx = (CRAWLER.arpIdx + 1) % CRAWLER.arpSeq.length;
    const noteDur = (SIXTEENTH_MS * 1.9) / 1000;
    playSawNote(freq, noteDur, 0.28);
  }

  // Start crawling from current btn
  function startCrawler() {
    CRAWLER.active = true;
    CRAWLER.paused = false;
    if (CRAWLER.homeBtn) CRAWLER.homeBtn.el.classList.remove('crawler-idle');
    CRAWLER.arpSeq = buildArpSeq();
    CRAWLER.fullArpSeq = CRAWLER.arpSeq.slice();
    CRAWLER.arpIdx = 0;
    // Crawler is driven by processTick — start master clock if no drums are active
    if (activeButtons.size === 0) startMasterClock();
    renderCrawler();
  }

  // Stop and reset to home
  function pauseCrawler() {
    CRAWLER.active = false;
    CRAWLER.paused = true;
    CRAWLER.stuttering = false;
    // Stay in place — just dim the head slightly to show paused state
    if (CRAWLER.btn && !CRAWLER.btn.active) {
      crawlerPaint(CRAWLER.btn, 180, 160, 255, 0.45);
      CRAWLER.btn.el.style.filter = 'drop-shadow(0 0 6px rgba(160,130,255,0.4))';
    }
  }

  function resumeCrawler() {
    CRAWLER.active = true;
    CRAWLER.paused = false;
    if (activeButtons.size === 0) startMasterClock();
    renderCrawler();
  }

  function resetCrawler() {
    PENDING.stopped = false;
    clearPending();
    hidePitchControls();
    PITCH_CTRL.noteOffset = 0;
    CRAWLER.active = false;
    CRAWLER.paused = false;
    CRAWLER.stuttering = false;
    clearCrawlerVisual();
    CRAWLER.btn    = CRAWLER.homeBtn;
    CRAWLER.arpSeq = [];
    CRAWLER.arpIdx = 0;
    CRAWLER.nextArpSeq = null;
    if (activeButtons.size === 0) stopMasterClock();
    renderIdlePulse();
  }

  // Idle: pulsing white on home hex
  function renderIdlePulse() {
    if (!CRAWLER.homeBtn || !CRAWLER.homeBtn.el) return;
    if (!CRAWLER.homeBtn.active) {
      crawlerPaint(CRAWLER.homeBtn, 200, 190, 255, 0.55);
    }
    CRAWLER.homeBtn.el.classList.add('crawler-idle');
  }

  // Paint a hex with crawler colors, bypassing the empty-cell guard
  function crawlerPaint(btn, R, G, B, intensity) {
    if (!btn) return;
    btn.el.classList.add('crawler-over'); // suppress ring animation
    btn.el.style.setProperty('--r', R);
    btn.el.style.setProperty('--g', G);
    btn.el.style.setProperty('--b', B);
    btn.s1 && btn.s1.setAttribute('stop-color', `rgba(${Math.min(255,Math.round(R*1.3))},${Math.min(255,Math.round(G*1.3))},${Math.min(255,Math.round(B*1.3))},${intensity})`);
    btn.s2.setAttribute('stop-color', `rgba(${R},${G},${B},${intensity})`);
    btn.s3.setAttribute('stop-color', `rgba(${Math.round(R*0.4)},${Math.round(G*0.4)},${Math.round(B*0.4)},${intensity})`);
    btn.poly.setAttribute('fill', `url(#g${btn.col}_${btn.row})`);
    btn.poly.setAttribute('stroke', 'rgba(180,160,255,0.6)');
    btn.poly.setAttribute('stroke-width', '1.0');
  }

  // Find top-left hex: min (cx + cy)
  function findHomeHex() {
    if (!btns.length) return null;
    return btns.reduce((best, b) =>
      (b.cx + b.cy < best.cx + best.cy) ? b : best
    , btns[0]);
  }


  // ── Lead synth — portamento dual-saw, persists between notes ──
  const LEAD_OSC = { osc1: null, osc2: null, gain: null, freq: 220 };

  function ensureLeadOscs() {
    if (LEAD_OSC.osc1) return;
    const c = getCtx();
    const now = c.currentTime;
    LEAD_OSC.gain = c.createGain();
    LEAD_OSC.gain.gain.setValueAtTime(0, now);

    // Slightly brighter filter for lead vs bass
    const lpf1 = c.createBiquadFilter();
    lpf1.type = 'lowpass'; lpf1.frequency.value = 3200; lpf1.Q.value = 1.8;
    const lpf2 = c.createBiquadFilter();
    lpf2.type = 'lowpass'; lpf2.frequency.value = 3200; lpf2.Q.value = 1.8;

    LEAD_OSC.osc1 = c.createOscillator(); LEAD_OSC.osc1.type = 'sawtooth';
    LEAD_OSC.osc2 = c.createOscillator(); LEAD_OSC.osc2.type = 'sawtooth';
    LEAD_OSC.osc1.frequency.value = LEAD_OSC.freq;
    LEAD_OSC.osc2.frequency.value = LEAD_OSC.freq * Math.pow(2, 9/1200); // 9 cents detune

    LEAD_OSC.osc1.connect(lpf1); lpf1.connect(LEAD_OSC.gain);
    LEAD_OSC.osc2.connect(lpf2); lpf2.connect(LEAD_OSC.gain);
    LEAD_OSC.gain.connect(getLeadDest());
    LEAD_OSC.osc1.start(); LEAD_OSC.osc2.start();
    LEAD_OSC.lpf1 = lpf1; LEAD_OSC.lpf2 = lpf2;
  }

  function playLeadNote(freq) {
    ensureLeadOscs();
    const c = getCtx(), now = c.currentTime + AUDIO_AHEAD;
    // Portamento: glide over 2 sixteenth notes
    const glide = (SIXTEENTH_MS * 2) / 1000;
    LEAD_OSC.osc1.frequency.cancelScheduledValues(now);
    LEAD_OSC.osc2.frequency.cancelScheduledValues(now);
    LEAD_OSC.osc1.frequency.setValueAtTime(LEAD_OSC.osc1.frequency.value, now);
    LEAD_OSC.osc2.frequency.setValueAtTime(LEAD_OSC.osc2.frequency.value, now);
    LEAD_OSC.osc1.frequency.exponentialRampToValueAtTime(freq, now + glide);
    LEAD_OSC.osc2.frequency.exponentialRampToValueAtTime(freq * Math.pow(2, 9/1200), now + glide);
    LEAD_OSC.freq = freq;

    // Filter sweep follows pitch — lead stays brighter
    const fTarget = Math.min(12000, 1200 + freq * 5);
    LEAD_OSC.lpf1.frequency.cancelScheduledValues(now);
    LEAD_OSC.lpf1.frequency.setValueAtTime(LEAD_OSC.lpf1.frequency.value, now);
    LEAD_OSC.lpf1.frequency.linearRampToValueAtTime(fTarget, now + glide);
    LEAD_OSC.lpf2.frequency.cancelScheduledValues(now);
    LEAD_OSC.lpf2.frequency.setValueAtTime(LEAD_OSC.lpf2.frequency.value, now);
    LEAD_OSC.lpf2.frequency.linearRampToValueAtTime(fTarget, now + glide);

    // Gate: fade in now, hold, fade out before next note
    const holdDur = (SIXTEENTH_MS * 7.5) / 1000; // hold for ~2 bars worth
    LEAD_OSC.gain.gain.cancelScheduledValues(now);
    LEAD_OSC.gain.gain.setValueAtTime(LEAD_OSC.gain.gain.value, now);
    const leadVol = LEAD.arpSeq.length <= 1 ? 0.12 : 0.22;
    LEAD_OSC.gain.gain.linearRampToValueAtTime(leadVol, now + 0.015);
    LEAD_OSC.gain.gain.setValueAtTime(leadVol, now + holdDur - 0.02);
    LEAD_OSC.gain.gain.linearRampToValueAtTime(0.0, now + holdDur);
  }

  function stopLeadOscs(fadeDur) {
    if (!LEAD_OSC.osc1) return;
    const c = getCtx(), now = c.currentTime;
    const dur = fadeDur !== undefined ? fadeDur : 2.0;
    LEAD_OSC.gain.gain.cancelScheduledValues(now);
    LEAD_OSC.gain.gain.setValueAtTime(Math.max(0.001, LEAD_OSC.gain.gain.value), now);
    LEAD_OSC.gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    setTimeout(() => {
      try { LEAD_OSC.osc1.stop(); LEAD_OSC.osc2.stop(); } catch(e) {}
      LEAD_OSC.osc1 = null; LEAD_OSC.osc2 = null; LEAD_OSC.gain = null;
    }, (dur + 0.1) * 1000);
  }

  // Build lead arp: harmonically above bass, 4–8 notes, mid-range (200–900 Hz)
  function buildLeadSeq() {
    const root = rootPitch || 80;
    // Lead intervals: thirds, fifths, octaves, and compound intervals — above bass
    const leadIntervals = HARMONIC_INTERVALS.filter(iv => iv.ratio >= 1.25 && iv.ratio <= 4.0);
    const len = 4; // short loop — changes notes slowly (each note = 4 ticks)
    const seq = [];
    const usedR = [];
    for (let i = 0; i < len; i++) {
      const pool = leadIntervals.filter(iv => !usedR.slice(-2).includes(iv.ratio));
      const iv = pool[Math.floor(Math.random() * pool.length)];
      usedR.push(iv.ratio);
      let hz = root * iv.ratio;
      // Keep in mid/lead range 200–900 Hz
      while (hz < 200) hz *= 2;
      while (hz > 900) hz *= 0.5;
      seq.push(hz);
    }
    return seq;
  }

  // PENDING crawler — pulsing at home, waiting to take over
  const PENDING = { btn: null, stopped: false, fadeGen: 0 };

  function spawnPending() {
    if (PENDING.btn) return;
    const home = CRAWLER.homeBtn;
    if (!home || home.active) return;
    // Only spawn if crawler has moved away from home
    if (CRAWLER.btn && CRAWLER.btn.key === home.key) return;
    PENDING.btn = home;
    crawlerPaint(home, 255, 255, 255, 0.65);
    home.el.classList.add('crawler-idle');
  }

  function clearPending() {
    if (!PENDING.btn) return;
    PENDING.btn.el.classList.remove('crawler-idle');
    if (!PENDING.btn.active) setHexColor(PENDING.btn, 0, 0, 0, 0.0);
    PENDING.btn = null;
  }

  function halveArp() {
    const seq = CRAWLER.arpSeq;
    if (!seq.length) return;
    const newLen = Math.max(1, Math.floor(seq.length / 2));
    // At minimum (1), restore full sequence
    CRAWLER.arpSeq = seq.length === 1 ? CRAWLER.fullArpSeq.slice() : seq.slice(0, newLen);
    CRAWLER.arpIdx = CRAWLER.arpIdx % CRAWLER.arpSeq.length;
    checkPitchControls();
  }

  // Intercept taps on crawler or pending hex
  function crawlerHitTest(b) {
    if (PENDING.btn && b.key === PENDING.btn.key) {
      if (PENDING.stopped) {
        // Stopped → spawn fresh arp; bump gen to cancel any in-flight fade callback
        PENDING.stopped = false;
        PENDING.fadeGen++;
        if (arpBus) { arpBus.gain.cancelScheduledValues(0); arpBus.gain.value = 0.80; }
        clearPending();
        resetCrawler();
        startCrawler();
        setTimeout(spawnPending, 3000);
      } else {
        // Running → stop crawler immediately (no new notes), fade bus out
        PENDING.stopped = true;
        hidePitchControls();
        pauseCrawler();
        clearCrawlerVisual();
        fadeOutBassArp(() => {
          if (PENDING.btn) {
            crawlerPaint(PENDING.btn, 200, 60, 60, 0.5);
            PENDING.btn.el.classList.add('crawler-idle');
          }
        });
      }
      return true;
    }

    if (!CRAWLER.btn) return false;
    const isHead = b.key === CRAWLER.btn.key;
    const isTail = CRAWLER.trail.some(t => t.btn.key === b.key);
    if (!isHead && !isTail) return false;

    if (!CRAWLER.active && !CRAWLER.paused) {
      // Idle at home → start, spawn pending for next
      startCrawler();
      setTimeout(spawnPending, 3000);
    } else {
      // Active/paused → halve the loop
      halveArp();
    }
    return true;
  }

  // Called after buildGrid to place crawler at home
  function initCrawler() {
    clearInterval(CRAWLER.timer);
    clearInterval(CRAWLER.arpTimer);
    CRAWLER.active = false;
    CRAWLER.trail  = [];
    CRAWLER.homeBtn = findHomeHex();
    CRAWLER.btn     = CRAWLER.homeBtn;
    if (CRAWLER.homeBtn) renderIdlePulse();
  }


  // ══════════════════════════════════════════════════════════════════
  //  LEAD CRAWLER — right-side, portamento lead synth, slow step rate
  //  Warm amber/gold palette vs bass violet/white
  // ══════════════════════════════════════════════════════════════════

  const LEAD = {
    active:   false,
    paused:   false,
    btn:      null,
    trail:    [],
    arpSeq:   [],
    arpIdx:   0,
    homeBtn:  null,
    fullArpSeq: [],
    tickCount:  0,   // counts processTick calls — steps every 8 ticks (half-bar)
    arpTick:    0,   // counts processTick calls — fires note every 4 ticks (quarter-bar)
  };

  const LEAD_PENDING = { btn: null, stopped: false, fadeGen: 0 };

  // Find top-right hex for lead home
  function findLeadHomeHex() {
    if (!btns.length) return null;
    return btns.reduce((best, b) =>
      ((b.cx - b.cy) > (best.cx - best.cy)) ? b : best
    , btns[0]);
  }

  function leadCrawlerPaint(btn, R, G, B, intensity) {
    if (!btn) return;
    btn.el.classList.add('crawler-over');
    btn.el.style.setProperty('--r', R);
    btn.el.style.setProperty('--g', G);
    btn.el.style.setProperty('--b', B);
    btn.s1 && btn.s1.setAttribute('stop-color',
      `rgba(${Math.min(255,Math.round(R*1.3))},${Math.min(255,Math.round(G*1.3))},${Math.min(255,Math.round(B*1.3))},${intensity})`);
    btn.s2.setAttribute('stop-color', `rgba(${R},${G},${B},${intensity})`);
    btn.s3.setAttribute('stop-color', `rgba(${Math.round(R*0.4)},${Math.round(G*0.4)},${Math.round(B*0.4)},${intensity})`);
    btn.poly.setAttribute('fill', `url(#g${btn.col}_${btn.row})`);
    btn.poly.setAttribute('stroke', 'rgba(255,200,80,0.6)');
    btn.poly.setAttribute('stroke-width', '1.0');
  }

  function renderLeadCrawler() {
    const pendingKey = LEAD_PENDING.btn?.key;
    // Clear pass — skip pending and home hexes
    LEAD.trail.forEach(t => {
      if (!t.btn.active && t.btn.key !== pendingKey && t.btn !== LEAD.homeBtn) {
        t.btn.el.classList.remove('crawler-over');
        t.btn.el.style.filter = '';
        setHexColor(t.btn, 0, 0, 0, 0.0);
      }
    });
    // Paint pass — skip pending hex so it stays gold
    LEAD.trail.forEach(t => {
      if (t.btn.key === pendingKey) return;
      const intensity = t.age === 0 ? 0.38 : t.age === 1 ? 0.16 : 0.06;
      leadCrawlerPaint(t.btn, 255, 180, 40, intensity);
      t.btn.el.style.filter = '';
    });
    // Paint head — skip if it's on the pending hex
    if (LEAD.btn && LEAD.btn.key !== pendingKey) {
      leadCrawlerPaint(LEAD.btn, 255, 240, 160, 0.95);
      LEAD.btn.el.style.filter =
        'drop-shadow(0 0 14px rgba(255,210,80,0.9)) drop-shadow(0 0 30px rgba(255,160,40,0.5))';
    }
    // Always repaint pending hex last so nothing can overwrite it
    if (LEAD_PENDING.btn && !LEAD_PENDING.btn.active) {
      leadCrawlerPaint(LEAD_PENDING.btn, 255, 240, 160, 0.65);
      LEAD_PENDING.btn.el.classList.add('crawler-idle');
    }
  }

  function clearLeadCrawlerVisual() {
    if (LEAD.btn && LEAD.btn !== LEAD_PENDING.btn) restoreHexAfterCrawler(LEAD.btn);
    LEAD.trail.forEach(t => { if (t.btn !== LEAD_PENDING.btn) restoreHexAfterCrawler(t.btn); });
    LEAD.trail = [];
  }

  function renderLeadIdlePulse() {
    if (!LEAD.homeBtn || !LEAD.homeBtn.el) return;
    if (!LEAD.homeBtn.active) leadCrawlerPaint(LEAD.homeBtn, 255, 200, 80, 0.55);
    LEAD.homeBtn.el.classList.add('crawler-idle');
  }

  function leadStep() {
    if (!LEAD.active || !LEAD.btn) return;
    LEAD.trail.forEach(t => t.age++);
    const expired = LEAD.trail.filter(t => t.age > 1);
    expired.forEach(t => restoreHexAfterCrawler(t.btn));
    LEAD.trail = LEAD.trail.filter(t => t.age <= 2);
    LEAD.trail.push({ btn: LEAD.btn, age: 0 });

    const allNeighbors = getNeighborKeys(LEAD.btn.col, LEAD.btn.row)
      .map(k => hexMap[k]).filter(Boolean);
    const moveNeighborsL = allNeighbors.filter(b =>
      b.key !== LEAD.homeBtn?.key &&
      b.key !== CRAWLER.btn?.key &&
      !CRAWLER.trail.some(t => t.btn.key === b.key)
    );
    if (moveNeighborsL.length) {
      LEAD.btn = moveNeighborsL[Math.floor(Math.random() * moveNeighborsL.length)];
    }
    renderLeadCrawler();
  }

  function leadArpTick() {
    if (!LEAD.active) return;
    const seq = LEAD.arpSeq;
    if (!seq.length) return;
    const freq = seq[LEAD.arpIdx % seq.length];
    LEAD.arpIdx = (LEAD.arpIdx + 1) % seq.length;
    playLeadNote(freq);
  }

  function startLeadCrawler() {
    LEAD.active = true;
    LEAD.paused = false;
    LEAD.tickCount = 0;
    LEAD.arpTick   = 0;
    if (LEAD.homeBtn) LEAD.homeBtn.el.classList.remove('crawler-idle');
    LEAD.arpSeq = buildLeadSeq();
    LEAD.fullArpSeq = LEAD.arpSeq.slice();
    LEAD.arpIdx = 0;
    if (activeButtons.size === 0 && !CRAWLER.active) startMasterClock();
    renderLeadCrawler();
  }

  function pauseLeadCrawler() {
    LEAD.active = false;
    LEAD.paused = true;
    stopLeadOscs();
    if (LEAD.btn && !LEAD.btn.active) {
      leadCrawlerPaint(LEAD.btn, 200, 140, 40, 0.45);
      LEAD.btn.el.style.filter = 'drop-shadow(0 0 6px rgba(255,180,60,0.4))';
    }
  }

  function resumeLeadCrawler() {
    LEAD.active = true;
    LEAD.paused = false;
    if (activeButtons.size === 0 && !CRAWLER.active) startMasterClock();
    renderLeadCrawler();
  }

  function resetLeadCrawler() {
    LEAD_PENDING.stopped = false;
    clearLeadPending();
    hideLeadPitchControls();
    LEAD_PITCH.noteOffset = 0;
    LEAD.active = false;
    LEAD.paused = false;
    LEAD.tickCount = 0;
    LEAD.arpTick   = 0;
    stopLeadOscs();
    clearLeadCrawlerVisual();
    LEAD.btn    = LEAD.homeBtn;
    LEAD.arpSeq = [];
    LEAD.arpIdx = 0;
    if (activeButtons.size === 0 && !CRAWLER.active) stopMasterClock();
    renderLeadIdlePulse();
  }

  function spawnLeadPending() {
    if (LEAD_PENDING.btn) return;
    const home = LEAD.homeBtn;
    if (!home || home.active) return;
    if (LEAD.btn && LEAD.btn.key === home.key) return;
    LEAD_PENDING.btn = home;
    leadCrawlerPaint(home, 255, 240, 160, 0.65);
    home.el.classList.add('crawler-idle');
  }

  function clearLeadPending() {
    if (!LEAD_PENDING.btn) return;
    LEAD_PENDING.btn.el.classList.remove('crawler-idle');
    if (!LEAD_PENDING.btn.active) setHexColor(LEAD_PENDING.btn, 0, 0, 0, 0.0);
    LEAD_PENDING.btn = null;
  }

  function leadCrawlerHitTest(b) {
    if (LEAD_PENDING.btn && b.key === LEAD_PENDING.btn.key) {
      if (LEAD_PENDING.stopped) {
        // Stopped → spawn fresh lead; bump gen to cancel in-flight fade callback
        LEAD_PENDING.stopped = false;
        LEAD_PENDING.fadeGen++;
        clearLeadPending();
        resetLeadCrawler();
        startLeadCrawler();
        setTimeout(spawnLeadPending, 3000);
      } else {
        // Running → stop crawler immediately (no new notes), fade osc out
        LEAD_PENDING.stopped = true;
        hideLeadPitchControls();
        const leadGen = ++LEAD_PENDING.fadeGen;
        pauseLeadCrawler();
        clearLeadCrawlerVisual();
        stopLeadOscs(2.0);
        setTimeout(() => {
          if (leadGen !== LEAD_PENDING.fadeGen) return; // cancelled
          if (LEAD_PENDING.btn) {
            leadCrawlerPaint(LEAD_PENDING.btn, 180, 80, 20, 0.5);
            LEAD_PENDING.btn.el.classList.add('crawler-idle');
          }
        }, 2100);
      }
      return true;
    }
    if (!LEAD.btn) return false;
    const isHead = b.key === LEAD.btn.key;
    const isTail = LEAD.trail.some(t => t.btn.key === b.key);
    if (!isHead && !isTail) return false;

    if (!LEAD.active && !LEAD.paused) {
      startLeadCrawler();
      setTimeout(spawnLeadPending, 3000);
    } else {
      // Halve lead arp loop
      const seq = LEAD.arpSeq;
      if (seq.length) {
        const newLen = Math.max(1, Math.floor(seq.length / 2));
        LEAD.arpSeq = seq.length === 1 ? LEAD.fullArpSeq.slice() : seq.slice(0, newLen);
        LEAD.arpIdx = LEAD.arpIdx % LEAD.arpSeq.length;
      }
      checkLeadPitchControls();
    }
    return true;
  }

  function initLeadCrawler() {
    LEAD.active = false;
    LEAD.trail  = [];
    LEAD.homeBtn = findLeadHomeHex();
    LEAD.btn     = LEAD.homeBtn;
    if (LEAD.homeBtn) renderLeadIdlePulse();
  }

  // ══════════════════════════════════════════════════════════════════
  //  ARP PITCH CONTROLS — appear when loop reaches 2 notes
  //  Two hexes in the lower-left: UP shifts root up one interval,
  //  DOWN shifts root down one interval
  // ══════════════════════════════════════════════════════════════════

  const PITCH_CTRL = { up: null, dn: null, visible: false, noteOffset: 0 };

  // Bass-range intervals for pitch stepping (in semitones from root)
  const PITCH_STEPS = [0, 2, 3, 5, 7, 9, 10, 12, 14, 15, 17, 19, 21, 24];
  // semitone → frequency ratio
  function semiToRatio(semi) { return Math.pow(2, semi / 12); }

  function findLowerRightHexes() {
    // Score: high cy = near bottom, high cx = near right
    const maxCy = Math.max(...btns.map(b => b.cy));
    const rowSp = hexR * Math.sqrt(3) + GAP;
    const sorted = [...btns]
      .filter(b => b.cy < maxCy - rowSp * 0.5)
      .sort((a, b) => {
        const scoreA = a.cy + a.cx * 1.5;
        const scoreB = b.cy + b.cx * 1.5;
        return scoreB - scoreA;
      });
    const occupied = new Set([
      CRAWLER.btn?.key, PENDING.btn?.key, CRAWLER.homeBtn?.key,
      LEAD.btn?.key, LEAD_PENDING.btn?.key, LEAD.homeBtn?.key,
      ...CRAWLER.trail.map(t => t.btn.key),
      ...LEAD.trail.map(t => t.btn.key),
    ]);
    const free = sorted.filter(b => !b.active && !occupied.has(b.key));
    return [free[0] || null, free[1] || null];
  }

  function findLowerLeftHexes() {
    // Score: high cy = near bottom, low cx = near left
    // Exclude the very bottom row to avoid clipping on small screens
    const maxCy = Math.max(...btns.map(b => b.cy));
    const rowSp = hexR * Math.sqrt(3) + GAP;
    const sorted = [...btns]
      .filter(b => b.cy < maxCy - rowSp * 0.5)
      .sort((a, b) => {
        const scoreA = a.cy - a.cx * 1.5;
        const scoreB = b.cy - b.cx * 1.5;
        return scoreB - scoreA;
      });
    // Skip any that are active kicks or the crawler/pending
    const occupied = new Set([
      CRAWLER.btn?.key, PENDING.btn?.key,
      CRAWLER.homeBtn?.key,
      LEAD.btn?.key, LEAD_PENDING.btn?.key,
      LEAD.homeBtn?.key,
      ...CRAWLER.trail.map(t => t.btn.key),
      ...LEAD.trail.map(t => t.btn.key),
    ]);
    const free = sorted.filter(b => !b.active && !occupied.has(b.key));
    return [free[0] || null, free[1] || null];
  }

  function paintPitchCtrl() {
    if (PITCH_CTRL.up && !PITCH_CTRL.up.active) {
      crawlerPaint(PITCH_CTRL.up, 80, 220, 160, 0.65); // green-teal = UP
      PITCH_CTRL.up.el.classList.add('crawler-idle');
    }
    if (PITCH_CTRL.dn && !PITCH_CTRL.dn.active) {
      crawlerPaint(PITCH_CTRL.dn, 220, 80, 160, 0.65); // magenta = DOWN
      PITCH_CTRL.dn.el.classList.add('crawler-idle');
    }
  }

  function clearPitchCtrl() {
    [PITCH_CTRL.up, PITCH_CTRL.dn].forEach(b => {
      if (!b) return;
      b.el.classList.remove('crawler-idle');
      b.el.style.filter = '';
      if (!b.active) setHexColor(b, 0, 0, 0, 0.0);
    });
    PITCH_CTRL.up = null;
    PITCH_CTRL.dn = null;
    PITCH_CTRL.visible = false;
  }

  function showPitchControls() {
    if (PITCH_CTRL.visible) return;
    const [a, b] = findLowerLeftHexes();
    if (!a || !b) return;
    PITCH_CTRL.up = a;
    PITCH_CTRL.dn = b;
    PITCH_CTRL.visible = true;
    paintPitchCtrl();
  }

  function hidePitchControls() {
    clearPitchCtrl();
  }

  // Step start note through the notes of the current full sequence
  function shiftArpPitch(delta) {
    const base = CRAWLER.fullArpSeq;
    if (!base.length) return;
    // Advance offset — never mutate fullArpSeq, always rotate from the original
    PITCH_CTRL.noteOffset = ((PITCH_CTRL.noteOffset + delta) % base.length + base.length) % base.length;
    const rotated = [...base.slice(PITCH_CTRL.noteOffset), ...base.slice(0, PITCH_CTRL.noteOffset)];
    CRAWLER.arpSeq = rotated.slice(0, CRAWLER.arpSeq.length);
    // fullArpSeq stays unchanged so repeated presses always rotate from the same root
    const btn = delta > 0 ? PITCH_CTRL.up : PITCH_CTRL.dn;
    if (btn) {
      btn.el.classList.add('pressed');
      setTimeout(() => { btn.el.classList.remove('pressed'); paintPitchCtrl(); }, 150);
    }
  }

  // Check if pitch controls should appear/disappear based on loop length
  function checkPitchControls() {
    if (!CRAWLER.active && !CRAWLER.paused) { hidePitchControls(); return; }
    if (CRAWLER.arpSeq.length <= 2) showPitchControls();
    else hidePitchControls();
  }

  // Intercept pitch control taps — called before normal crawlerHitTest
  function pitchCtrlHitTest(b) {
    if (!PITCH_CTRL.visible) return false;
    if (PITCH_CTRL.up && b.key === PITCH_CTRL.up.key) {
      shiftArpPitch(1); // step up one note
      return true;
    }
    if (PITCH_CTRL.dn && b.key === PITCH_CTRL.dn.key) {
      shiftArpPitch(-1); // step down one note
      return true;
    }
    return false;
  }


  // ── Lead pitch controls — bottom-right, same halve-to-2 trigger ──
  const LEAD_PITCH = { up: null, dn: null, visible: false, noteOffset: 0 };

  function paintLeadPitchCtrl() {
    if (LEAD_PITCH.up && !LEAD_PITCH.up.active) {
      leadCrawlerPaint(LEAD_PITCH.up, 255, 200, 40, 0.65); // gold = UP
      LEAD_PITCH.up.el.classList.add('crawler-idle');
    }
    if (LEAD_PITCH.dn && !LEAD_PITCH.dn.active) {
      leadCrawlerPaint(LEAD_PITCH.dn, 255, 100, 20, 0.65); // amber-orange = DOWN
      LEAD_PITCH.dn.el.classList.add('crawler-idle');
    }
  }

  function clearLeadPitchCtrl() {
    [LEAD_PITCH.up, LEAD_PITCH.dn].forEach(b => {
      if (!b) return;
      b.el.classList.remove('crawler-idle');
      b.el.style.filter = '';
      if (!b.active) setHexColor(b, 0, 0, 0, 0.0);
    });
    LEAD_PITCH.up = null; LEAD_PITCH.dn = null; LEAD_PITCH.visible = false;
  }

  function showLeadPitchControls() {
    if (LEAD_PITCH.visible) return;
    const [a, b] = findLowerRightHexes();
    if (!a || !b) return;
    LEAD_PITCH.up = a; LEAD_PITCH.dn = b;
    LEAD_PITCH.visible = true;
    paintLeadPitchCtrl();
  }

  function hideLeadPitchControls() { clearLeadPitchCtrl(); }

  function shiftLeadPitch(delta) {
    const base = LEAD.fullArpSeq;
    if (!base.length) return;
    LEAD_PITCH.noteOffset = ((LEAD_PITCH.noteOffset + delta) % base.length + base.length) % base.length;
    const rotated = [...base.slice(LEAD_PITCH.noteOffset), ...base.slice(0, LEAD_PITCH.noteOffset)];
    LEAD.arpSeq = rotated.slice(0, LEAD.arpSeq.length);
    // fullArpSeq stays unchanged so repeated presses always rotate from the same root
    const btn = delta > 0 ? LEAD_PITCH.up : LEAD_PITCH.dn;
    if (btn) {
      btn.el.classList.add('pressed');
      setTimeout(() => { btn.el.classList.remove('pressed'); paintLeadPitchCtrl(); }, 150);
    }
  }

  function checkLeadPitchControls() {
    if (!LEAD.active && !LEAD.paused) { hideLeadPitchControls(); return; }
    if (LEAD.arpSeq.length <= 2) showLeadPitchControls();
    else hideLeadPitchControls();
  }

  function leadPitchHitTest(b) {
    if (!LEAD_PITCH.visible) return false;
    if (LEAD_PITCH.up && b.key === LEAD_PITCH.up.key) { shiftLeadPitch(1);  return true; }
    if (LEAD_PITCH.dn && b.key === LEAD_PITCH.dn.key) { shiftLeadPitch(-1); return true; }
    return false;
  }

  // Prevent iOS double-tap zoom and pinch-to-zoom
  // Block all gesture events
  document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
  document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
  document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });

  // Block multi-touch zoom
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // Block double-tap zoom on both touchstart and touchend
  let lastTap = 0;
  document.addEventListener('touchstart', e => {
    const now = Date.now();
    if (now - lastTap < 300) {
      e.preventDefault();
      e.stopPropagation();
    }
    lastTap = now;
  }, { passive: false });
  document.addEventListener('touchend', e => {
    e.preventDefault();
  }, { passive: false });

  // Belt-and-suspenders: block dblclick too
  document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });

})();
</script>
